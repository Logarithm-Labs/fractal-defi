[settings]
# Three-block layout (stdlib, third-party, local) with one blank line
# between each. Matches the existing convention in ``fractal/`` and
# ``tests/`` and stays compatible with flake8 (max line length 120
# from ``.flake8``).
line_length = 120
multi_line_output = 3
include_trailing_comma = True
force_grid_wrap = 0
use_parentheses = True
ensure_newline_before_comments = True

# ``fractal`` is treated as the first-party package so its imports get
# sorted into the local block, separate from third-party (pandas,
# pytest, numpy, mlflow, ...).
known_first_party = fractal

# Respect noqa-style comments — never reorder imports the author
# explicitly pinned with ``# isort: skip`` or ``# noqa``.
skip_gitignore = True

# Skip:
# - auto-generated Sphinx pages (``sphinx-apidoc`` regenerates them)
# - the e2e MLflow scripts: they manually inject ``sys.path`` before
#   importing local helpers, so isort would push standard imports
#   above the path-injection block and break runtime resolution.
skip_glob =
    docs/build/*
    docs/source/_static/*
    tests/mlflow_tests/scripts/*
